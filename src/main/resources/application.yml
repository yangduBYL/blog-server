server:
  port: ${SERVER_PORT:8080}

spring:
  application:
    name: blog-server
  datasource:
    url: ${DB_URL:jdbc:mysql://localhost:3306/blog_db?useUnicode=true&characterEncoding=utf-8&serverTimezone=Asia/Shanghai}
    username: ${DB_USERNAME:root}
    password: ${DB_PASSWORD:123456}
    driver-class-name: com.mysql.cj.jdbc.Driver
  data:
    redis:
      host: ${REDIS_HOST:127.0.0.1}
      port: ${REDIS_PORT:6379}
      database: ${REDIS_DATABASE:0}
      password: ${REDIS_PASSWORD:123456}
  flyway:
    enabled: true
    locations: classpath:db/migration
    baseline-on-migrate: true
  servlet:
    multipart:
      max-file-size: 10MB
      max-request-size: 10MB

mybatis-plus:
  configuration:
    map-underscore-to-camel-case: true
    log-impl: org.apache.ibatis.logging.stdout.StdOutImpl
  global-config:
    db-config:
      id-type: auto
      logic-delete-field: deleted
      logic-delete-value: 1
      logic-not-delete-value: 0

blog:
  jwt:
    secret: ${JWT_SECRET:blog-platform-jwt-secret-key-change-in-production-2024}
    access-expiration: ${JWT_ACCESS_EXPIRATION:86400000}
    refresh-expiration: ${JWT_REFRESH_EXPIRATION:604800000}
  cache:
    base-ttl-minutes: ${CACHE_BASE_TTL:30}
    jitter-minutes: ${CACHE_JITTER:10}
    null-ttl-minutes: ${CACHE_NULL_TTL:2}
    lock-wait-ms: ${CACHE_LOCK_WAIT:100}
    lock-expire-seconds: ${CACHE_LOCK_EXPIRE:10}
  oss:
    enabled: ${OSS_ENABLED:true}
    endpoint: ${OSS_ENDPOINT:oss-cn-beijing.aliyuncs.com}
    access-key-id: ${OSS_ACCESS_KEY_ID:your-access-key-id-here}
    access-key-secret: ${OSS_ACCESS_KEY_SECRET:your-access-key-secret-here}
    bucket-name: ${OSS_BUCKET_NAME:blogservicewjx}
    cdn-domain: ${OSS_CDN_DOMAIN:}
  upload:
    local-path: ${UPLOAD_LOCAL_PATH:./uploads}
    max-size: ${UPLOAD_MAX_SIZE:5242880}

springdoc:
  api-docs:
    path: /v3/api-docs
  swagger-ui:
    path: /swagger-ui.html

management:
  endpoints:
    web:
      exposure:
        include: health,info

logging:
  level:
    com.example.blog: ${LOG_LEVEL:debug}
